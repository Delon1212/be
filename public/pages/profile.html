<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - BE OFFICIAL STORE</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="location.href='/'">BE OFFICIAL STORE</div>
        <div class="nav-links" id="navLinks">
            <a href="/">Home</a>
            <a href="/pages/products.html">Produk</a>
            <a href="/pages/cart.html">Keranjang <span id="cartCount">0</span></a>
            <a href="/pages/orders.html">Pesanan</a>
            <a href="/pages/profile.html">Profil</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
        <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
        <div class="menu-overlay" id="menuOverlay"></div>
    </nav>

    <div class="container">
        <div class="profile-container">
            <div class="profile-header">
                <img id="profileAvatar" class="profile-avatar" src="https://via.placeholder.com/100">
                <div><h3 id="profileName"></h3><p id="profileEmail"></p><p id="profilePhone"></p></div>
            </div>
            <form id="profileForm">
                <h3>Edit Profil</h3>
                <div class="form-group"><label>Nama Lengkap</label><input type="text" id="full_name"></div>
                <div class="form-group"><label>Telepon</label><input type="tel" id="phone"></div>
                <div class="form-group"><label>Provinsi</label><input type="text" id="provinsi"></div>
                <div class="form-group"><label>Kota</label><input type="text" id="kota"></div>
                <div class="form-group"><label>Kode Pos</label><input type="text" id="kode_pos"></div>
                <div class="form-group"><label>Alamat</label><textarea id="address" rows="3"></textarea></div>
                <div class="form-group"><label>Foto Profil</label><input type="file" id="foto" accept="image/*"></div>
                <button type="submit" class="btn btn-primary">Update Profil</button>
            </form>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/cart.js"></script>  <!-- cart.js harus setelah auth.js -->
    <script src="/js/menu.js"></script>
    <script src="/js/pages/profile.js"></script>
</body>
</html>
