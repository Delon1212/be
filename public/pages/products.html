<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Produk - Delon Store</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="location.href='/'">BE OFFICIAL STORE</div>
        <div class="nav-links" id="navLinks">
            <a href="/">Home</a>
            <a href="/pages/products.html">Produk</a>
            <a href="/pages/cart.html">Keranjang <span id="cartCount">0</span></a>
            <a href="/pages/orders.html">Pesanan</a>
            <a href="/pages/profile.html">Profil</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
        <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
        <div class="menu-overlay" id="menuOverlay"></div>
    </nav>

    <div class="container">
        <h1>Koleksi Produk</h1>
        
        <!-- Search & Filter Section -->
        <div class="search-section">
            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Cari parfum... (contoh: musk, floral, oud)">
                    <button id="searchBtn" class="btn btn-primary">Cari</button>
                </div>
                
                <div class="filter-options">
                    <div class="filter-group">
                        <label><i class="fas fa-tag"></i> Harga:</label>
                        <select id="priceFilter">
                            <option value="">Semua Harga</option>
                            <option value="0-100000">Rp 0 - 100.000</option>
                            <option value="100000-200000">Rp 100.000 - 200.000</option>
                            <option value="200000-300000">Rp 200.000 - 300.000</option>
                            <option value="300000-500000">Rp 300.000 - 500.000</option>
                            <option value="500000-9999999">Rp 500.000+</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label><i class="fas fa-sort"></i> Urutkan:</label>
                        <select id="sortFilter">
                            <option value="newest">✨ Terbaru</option>
                            <option value="price_asc">💰 Harga Terendah</option>
                            <option value="price_desc">💎 Harga Tertinggi</option>
                            <option value="name_asc">📝 Nama A-Z</option>
                        </select>
                    </div>
                    
                    <button id="resetFilterBtn" class="btn btn-secondary">
                        <i class="fas fa-undo-alt"></i> Reset Filter
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Search Result Info -->
        <div id="searchInfo" class="search-info" style="display: none;">
            <div class="search-info-content">
                <i class="fas fa-search"></i>
                <span id="searchResultText"></span>
            </div>
            <button id="clearSearchBtn" class="btn-clear">
                <i class="fas fa-times"></i> Hapus Pencarian
            </button>
        </div>
        
        <!-- Products Grid -->
        <div class="products-grid" id="productsContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Memuat produk...</p>
            </div>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightboxModal" class="lightbox-modal">
        <span class="lightbox-close">&times;</span>
        <button class="lightbox-prev">&#10094;</button>
        <button class="lightbox-next">&#10095;</button>
        <div class="lightbox-container">
            <img class="lightbox-image" src="" alt="">
            <div class="lightbox-caption"></div>
            <div class="lightbox-counter"></div>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/cart.js"></script>
    <script src="/js/menu.js"></script>
    <script src="/js/lightbox.js"></script>
    <script src="/js/pages/products.js"></script>
</body>
</html>
