<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Pembayaran - Delon Store</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="location.href='/'">BE OFFICIAL STORE</div>
        <div class="nav-links" id="navLinks">
            <a href="/">Home</a>
            <a href="/pages/products.html">Produk</a>
            <a href="/pages/cart.html">Keranjang <span id="cartCount">0</span></a>
            <a href="/pages/orders.html">Pesanan</a>
            <a href="/pages/profile.html">Profil</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
        <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
        <div class="menu-overlay" id="menuOverlay"></div>
    </nav>

    <div class="container">
        <div class="form-container" style="max-width: 600px; margin: 2rem auto;">
            <h2 style="text-align: center;">Konfirmasi Pembayaran</h2>
            
            <!-- Informasi Bank -->
            <div style="background: rgba(212, 175, 55, 0.1); padding: 1rem; border-radius: 8px;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <p><strong>🏦 BCA:</strong> 1234567890 a.n Delon Store</p>
        <button class="btn-copy" onclick="salinTeks('1234567890', this)">Salin</button>
    </div>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <p><strong>🏦 Mandiri:</strong> 0987654321 a.n Delon Store</p>
        <button class="btn-copy" onclick="salinTeks('0987654321', this)">Salin</button>
    </div>
    
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <p><strong>🏦 BRI:</strong> 1122334455 a.n Delon Store</p>
        <button class="btn-copy" onclick="salinTeks('1122334455', this)">Salin</button>
    </div>
    
</div>
            
            <!-- Info User yang Login -->
            <div id="userInfo"></div>
            
            <!-- Deadline Info -->
            <div id="deadlineInfo"></div>
            
            <form id="paymentForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Order ID</label>
                    <input type="text" id="order_id" readonly style="background: black;">
                </div>
                
                <div class="form-group">
                    <label>Total Yang Harus Dibayar</label>
                    <input type="text" id="total_bayar" readonly style="background: black; font-weight: bold; color: #27ae60;">
                </div>
                
                <div class="form-group">
                    <label>Nama Pengirim *</label>
                    <input type="text" id="nama_pengirim" required placeholder="Contoh: Budi Santoso">
                </div>
                
                <div class="form-group">
                    <label>Bank Pengirim *</label>
                    <select id="bank_pengirim" required>
                        <option value="">Pilih Bank</option>
                        <option value="BCA">BCA</option>
                        <option value="Mandiri">Mandiri</option>
                        <option value="BRI">BRI</option>
                        <option value="BNI">BNI</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Jumlah Transfer *</label>
                    <input type="number" id="jumlah_transfer" required placeholder="Masukkan jumlah yang ditransfer">
                </div>
                
                <div class="form-group">
                    <label>Tanggal Transfer *</label>
                    <input type="date" id="tanggal_transfer" required>
                </div>
                
                <div class="form-group">
                    <label>Bukti Transfer *</label>
                    <input type="file" id="bukti_transfer" accept="image/jpeg,image/jpg,image/png" required>
                    <small style="color: #666;">Format: JPG, PNG (Max 10MB)</small>
                    <div id="buktiPreview"></div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem;">
                    📤 Kirim Konfirmasi
                </button>
            </form>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/cart.js"></script>
    <script src="/js/menu.js"></script>
    <script src="/js/pages/payment.js"></script>
</body>
</html>
